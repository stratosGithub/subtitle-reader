<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SubReader">
  <meta name="theme-color" content="#1a1d23">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>SubReader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1d23;
      --bg-secondary: #22262e;
      --bg-row-alt: #1e2228;
      --bg-selected: #1a3a5c;
      --bg-active: #162b16;
      --border: #2a2e36;
      --text-primary: #d4d8e0;
      --text-secondary: #8a8f9a;
      --accent: #4a9eff;
      --accent-green: #4adf7a;
      --toolbar-bg: #16181e;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── Header ── */
    .header {
      background: var(--bg-secondary);
      padding: calc(var(--safe-top) + 8px) 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .app-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-actions { display: flex; gap: 12px; }

    .header-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      padding: 6px;
      cursor: pointer;
      border-radius: 6px;
    }

    .header-btn:active { background: rgba(255,255,255,0.08); }

    .tabs { display: flex; }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Search Bar ── */
    .search-bar {
      display: none;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-bar.visible {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-bar input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
    }

    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--text-secondary); }

    .search-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      padding: 6px;
      cursor: pointer;
    }

    .search-count { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

    /* ── Column Header ── */
    .col-header {
      display: grid;
      grid-template-columns: 38px 72px 72px 1fr 44px;
      align-items: center;
      padding: 8px 8px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .col-header span:first-child {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Subtitle Table List ── */
    .subtitle-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .subtitle-row {
      display: grid;
      grid-template-columns: 38px 72px 72px 1fr 44px;
      align-items: center;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      transition: background 0.2s;
      min-height: 48px;
    }

    .subtitle-row:nth-child(odd) { background: var(--bg-row-alt); }
    .subtitle-row.selected { background: var(--bg-selected); }

    .subtitle-row.active-sub {
      background: var(--bg-active);
      border-left: 3px solid var(--accent-green);
    }

    .subtitle-row.active-sub .text-cell { color: #fff; font-weight: 500; }
    .subtitle-row.active-sub .time-cell { color: var(--accent-green); }

    .subtitle-row .cb {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .subtitle-row .cb input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .time-cell {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      padding-right: 4px;
      cursor: pointer;
    }

    .text-cell {
      color: var(--text-primary);
      line-height: 1.4;
      padding-right: 8px;
      word-break: break-word;
    }

    .action-cell { display: flex; align-items: center; justify-content: center; }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      padding: 6px;
      cursor: pointer;
      border-radius: 4px;
    }

    .action-btn:active { color: var(--accent); }

    /* ── Reader View ── */
    .reader-view {
      display: none;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px;
    }

    .reader-card {
      margin-bottom: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
      border-left: 3px solid transparent;
    }

    .reader-card.active-sub {
      background: var(--bg-active);
      border-left-color: var(--accent-green);
      box-shadow: 0 0 12px rgba(74, 223, 122, 0.15);
    }

    .reader-card.active-sub .reader-text { color: #fff; font-weight: 500; }
    .reader-card.active-sub .reader-time { color: var(--accent-green); }

    .reader-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    .reader-text {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-primary);
    }

    /* ── Bottom Toolbar ── */
    .toolbar {
      background: var(--toolbar-bg);
      border-top: 1px solid var(--border);
      padding: 6px 10px calc(var(--safe-bottom) + 6px);
      flex-shrink: 0;
    }

    .toolbar-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .toolbar-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      padding: 8px;
      cursor: pointer;
      border-radius: 8px;
    }

    .toolbar-btn:active {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }

    .toolbar-play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .toolbar-play.playing {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(74, 223, 122, 0.1);
    }

    .toolbar-play:active { opacity: 0.7; }

    .toolbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .toolbar-timer {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      min-width: 60px;
      text-align: right;
    }

    .toolbar-timer.active { color: var(--accent-green); }

    .toolbar-info {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ── Scrubber (in toolbar, below buttons) ── */
    .toolbar-scrubber {
      display: none;
      padding: 6px 0 2px;
    }

    .toolbar-scrubber.visible { display: flex; align-items: center; gap: 8px; }

    .scrubber-time-label {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 10px;
      color: var(--text-secondary);
      min-width: 50px;
    }

    .scrubber-time-label.right { text-align: right; }

    .scrubber-track {
      flex: 1;
      height: 28px;
      display: flex;
      align-items: center;
      cursor: pointer;
      position: relative;
      touch-action: none;
    }

    .scrubber-bg {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .scrubber-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.15s linear;
    }

    .scrubber-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: left 0.15s linear;
    }

    .scrubber-track.dragging .scrubber-fill,
    .scrubber-track.dragging .scrubber-thumb { transition: none; }

    /* ── Empty State ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 24px;
      text-align: center;
    }

    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }

    .load-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .load-btn:active { opacity: 0.8; }

    /* ── Detail Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--bg-secondary);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      padding: 20px 20px calc(var(--safe-bottom) + 20px);
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .modal-index { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }

    .modal-time {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .modal-text {
      font-size: 18px;
      line-height: 1.6;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .modal-nav { display: flex; gap: 12px; }

    .modal-nav button {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-nav button:active { background: var(--border); }
    .modal-nav button:disabled { opacity: 0.3; }

    /* ── Misc ── */
    .subtitle-list::-webkit-scrollbar { width: 3px; }
    .subtitle-list::-webkit-scrollbar-track { background: transparent; }
    .subtitle-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .select-all-cb { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

    .highlight { background: rgba(74, 158, 255, 0.25); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <span class="app-title" id="appTitle">SubReader <span style="font-size:11px;font-weight:400;color:var(--text-secondary)">v1.2</span></span>
        <div class="header-actions">
          <button class="header-btn" id="btnLoad" title="Load SRT file">📂</button>
          <button class="header-btn" id="btnSettings" title="Settings">⚙️</button>
        </div>
      </div>
      <div class="tabs">
        <div class="tab active" data-tab="subtitles">Subtitles</div>
        <div class="tab" data-tab="reader">Reader</div>
      </div>
    </header>

    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="Search subtitles…">
      <span class="search-count" id="searchCount"></span>
      <button class="search-close" id="searchClose">✕</button>
    </div>

    <!-- Subtitles Tab -->
    <div class="col-header" id="colHeader" style="display:none;">
      <span><input type="checkbox" class="select-all-cb" id="selectAll"></span>
      <span>Start</span>
      <span>End</span>
      <span>Text</span>
      <span></span>
    </div>
    <div class="subtitle-list" id="subtitleList"></div>

    <!-- Reader Tab -->
    <div class="reader-view" id="readerView"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📄</div>
      <div class="empty-title">No Subtitles Loaded</div>
      <div class="empty-desc">Load an .srt file to view and browse subtitles on your phone.</div>
      <button class="load-btn" id="btnLoadEmpty">Load SRT File</button>
    </div>

    <!-- Bottom Toolbar -->
    <div class="toolbar">
      <div class="toolbar-main">
        <div class="toolbar-left">
          <button class="toolbar-btn" id="btnSearch" title="Search">🔍</button>
          <button class="toolbar-btn" id="btnSkipBack" title="Back 10s">⏪</button>
          <button class="toolbar-play" id="btnPlay" title="Play / Pause">▶</button>
          <button class="toolbar-btn" id="btnSkipFwd" title="Forward 10s">⏩</button>
          <button class="toolbar-btn" id="btnJumpTop" title="Jump to top">⏫</button>
          <button class="toolbar-btn" id="btnJumpBottom" title="Jump to bottom">⏬</button>
        </div>
        <div class="toolbar-right">
          <span class="toolbar-timer" id="toolbarTimer">00:00:00</span>
          <span class="toolbar-info" id="lineCount"></span>
        </div>
      </div>
      <div class="toolbar-scrubber" id="toolbarScrubber">
        <span class="scrubber-time-label" id="scrubberTimeLeft">00:00:00</span>
        <div class="scrubber-track" id="scrubberTrack">
          <div class="scrubber-bg">
            <div class="scrubber-fill" id="scrubberFill"></div>
          </div>
          <div class="scrubber-thumb" id="scrubberThumb"></div>
        </div>
        <span class="scrubber-time-label right" id="scrubberTimeRight">00:00:00</span>
      </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <div class="modal-handle"></div>
        <div class="modal-index" id="modalIndex"></div>
        <div class="modal-time" id="modalTime"></div>
        <div class="modal-text" id="modalText"></div>
        <div class="modal-nav">
          <button id="modalPrev">← Previous</button>
          <button id="modalNext">Next →</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".srt" style="display:none">

  <script>
    const state = {
      subtitles: [],
      selected: new Set(),
      searchQuery: '',
      filteredIndices: null,
      currentTab: 'subtitles',
      modalIdx: -1,
      fileName: '',
      playing: false,
      currentTime: 0,
      totalDuration: 0,
      playbackSpeed: 1.0,
      activeSubIdx: -1,
      lastFrameTime: 0,
      animFrameId: null
    };

    const $ = id => document.getElementById(id);

    // ── Time Utilities ──

    function timeToSeconds(str) {
      const p = str.split(':');
      if (p.length !== 3) return 0;
      return parseFloat(p[0]) * 3600 + parseFloat(p[1]) * 60 + parseFloat(p[2]);
    }

    function secondsToTime(sec) {
      sec = Math.max(0, sec);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function formatTime(str) {
      const p = str.split(':');
      if (p.length === 3) {
        const sp = p[2].split('.');
        const ms = (sp[1] || '000').substring(0, 2);
        return `${p[0]}:${p[1]},${sp[0]}${ms}`;
      }
      return str;
    }

    // ── SRT Parser ──

    function parseSRT(text) {
      const subs = [];
      const blocks = text.trim().replace(/\r\n/g, '\n').split(/\n\n+/);
      for (const block of blocks) {
        const lines = block.split('\n');
        if (lines.length < 2) continue;
        let idx = 0;
        if (/^\d+$/.test(lines[0].trim())) idx = 1;
        const timeLine = lines[idx];
        if (!timeLine) continue;
        const m = timeLine.match(
          /(\d{2}:\d{2}:\d{2}[,\.]\d{2,3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,\.]\d{2,3})/
        );
        if (!m) continue;
        const start = m[1].replace(',', '.');
        const end = m[2].replace(',', '.');
        subs.push({
          start, end,
          text: lines.slice(idx + 1).join('\n').trim().replace(/<[^>]+>/g, ''),
          startSec: timeToSeconds(start),
          endSec: timeToSeconds(end)
        });
      }
      return subs;
    }

    // ── Helpers ──

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function highlightText(text, query) {
      if (!query) return escapeHtml(text);
      const esc = escapeHtml(text);
      const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return esc.replace(new RegExp(`(${q})`, 'gi'), '<span class="highlight">$1</span>');
    }

    // ── Playback Engine ──

    function findActiveSubtitle(t) {
      for (let i = 0; i < state.subtitles.length; i++) {
        const s = state.subtitles[i];
        if (t >= s.startSec && t <= s.endSec) return i;
      }
      for (let i = 0; i < state.subtitles.length; i++) {
        if (state.subtitles[i].startSec > t) return i > 0 ? i - 1 : -1;
      }
      return state.subtitles.length > 0 ? state.subtitles.length - 1 : -1;
    }

    function playbackTick(ts) {
      if (!state.playing) return;
      if (state.lastFrameTime === 0) state.lastFrameTime = ts;

      const delta = (ts - state.lastFrameTime) / 1000;
      state.lastFrameTime = ts;
      state.currentTime += delta * state.playbackSpeed;

      if (state.currentTime >= state.totalDuration) {
        state.currentTime = state.totalDuration;
        pausePlayback();
        updatePlaybackUI();
        return;
      }

      updatePlaybackUI();
      state.animFrameId = requestAnimationFrame(playbackTick);
    }

    function startPlayback() {
      if (state.subtitles.length === 0) return;
      state.playing = true;
      state.lastFrameTime = 0;
      $('btnPlay').textContent = '⏸';
      $('btnPlay').classList.add('playing');
      $('toolbarTimer').classList.add('active');
      state.animFrameId = requestAnimationFrame(playbackTick);
    }

    function pausePlayback() {
      state.playing = false;
      $('btnPlay').textContent = '▶';
      $('btnPlay').classList.remove('playing');
      $('toolbarTimer').classList.remove('active');
      if (state.animFrameId) {
        cancelAnimationFrame(state.animFrameId);
        state.animFrameId = null;
      }
    }

    function togglePlayback() {
      if (state.playing) pausePlayback();
      else startPlayback();
    }

    function seekTo(time) {
      state.currentTime = Math.max(0, Math.min(time, state.totalDuration));
      state.lastFrameTime = 0;
      updatePlaybackUI();
    }

    function updatePlaybackUI() {
      const t = state.currentTime;
      const pct = state.totalDuration > 0 ? (t / state.totalDuration) * 100 : 0;

      $('toolbarTimer').textContent = secondsToTime(t);
      $('scrubberTimeLeft').textContent = secondsToTime(t);
      $('scrubberFill').style.width = pct + '%';
      $('scrubberThumb').style.left = pct + '%';

      const newIdx = findActiveSubtitle(t);
      if (newIdx !== state.activeSubIdx) {
        state.activeSubIdx = newIdx;
        applyActiveHighlight();
      }
    }

    function applyActiveHighlight() {
      const idx = state.activeSubIdx;

      if (state.currentTab === 'subtitles') {
        const list = $('subtitleList');
        const prev = list.querySelector('.active-sub');
        if (prev) prev.classList.remove('active-sub');
        if (idx >= 0) {
          const row = list.querySelector(`[data-idx="${idx}"]`);
          if (row) {
            row.classList.add('active-sub');
            if (state.playing) scrollToCenter(row, list);
          }
        }
      } else {
        const view = $('readerView');
        const prev = view.querySelector('.active-sub');
        if (prev) prev.classList.remove('active-sub');
        if (idx >= 0) {
          const card = view.querySelector(`[data-reader="${idx}"]`);
          if (card) {
            card.classList.add('active-sub');
            if (state.playing) scrollToCenter(card, view);
          }
        }
      }
    }

    function scrollToCenter(el, container) {
      const cRect = container.getBoundingClientRect();
      const eRect = el.getBoundingClientRect();
      const offset = (eRect.top + eRect.height / 2) - (cRect.top + cRect.height / 2);
      container.scrollBy({ top: offset, behavior: 'smooth' });
    }

    // ── Rendering ──

    function render() {
      const subs = state.subtitles;

      if (subs.length === 0) {
        $('emptyState').style.display = 'flex';
        $('colHeader').style.display = 'none';
        $('subtitleList').style.display = 'none';
        $('readerView').style.display = 'none';
        $('toolbarScrubber').classList.remove('visible');
        $('lineCount').textContent = '';
        return;
      }

      $('emptyState').style.display = 'none';
      $('toolbarScrubber').classList.add('visible');

      if (state.currentTab === 'subtitles') {
        $('colHeader').style.display = 'grid';
        $('subtitleList').style.display = 'block';
        $('readerView').style.display = 'none';
        renderSubtitleRows();
      } else {
        $('colHeader').style.display = 'none';
        $('subtitleList').style.display = 'none';
        $('readerView').style.display = 'block';
        renderReader();
      }

      $('lineCount').textContent = `${subs.length} lines`;
    }

    function renderSubtitleRows() {
      const subs = state.subtitles;
      const indices = state.filteredIndices !== null
        ? state.filteredIndices
        : subs.map((_, i) => i);

      let html = '';
      for (const i of indices) {
        const sub = subs[i];
        const sel = state.selected.has(i);
        const act = i === state.activeSubIdx;
        const cls = ['subtitle-row'];
        if (sel) cls.push('selected');
        if (act) cls.push('active-sub');

        html += `<div class="${cls.join(' ')}" data-idx="${i}">
          <div class="cb"><input type="checkbox" ${sel ? 'checked' : ''} data-check="${i}"></div>
          <div class="time-cell" data-seek="${i}">${formatTime(sub.start)}</div>
          <div class="time-cell" data-seek="${i}">${formatTime(sub.end)}</div>
          <div class="text-cell" data-view="${i}">${highlightText(sub.text, state.searchQuery)}</div>
          <div class="action-cell"><button class="action-btn" data-view="${i}">▶</button></div>
        </div>`;
      }
      $('subtitleList').innerHTML = html;

      if (state.filteredIndices !== null) {
        $('searchCount').textContent = `${indices.length} / ${subs.length}`;
      }
    }

    function renderReader() {
      const subs = state.subtitles;
      let html = '';
      for (let i = 0; i < subs.length; i++) {
        const sub = subs[i];
        const act = i === state.activeSubIdx;
        html += `<div class="reader-card${act ? ' active-sub' : ''}" data-reader="${i}">
          <div class="reader-time">${formatTime(sub.start)} → ${formatTime(sub.end)}</div>
          <div class="reader-text">${escapeHtml(sub.text)}</div>
        </div>`;
      }
      $('readerView').innerHTML = html;
    }

    // ── Modal ──

    function openModal(idx) {
      state.modalIdx = idx;
      const sub = state.subtitles[idx];
      if (!sub) return;
      $('modalIndex').textContent = `Subtitle ${idx + 1} of ${state.subtitles.length}`;
      $('modalTime').textContent = `${sub.start} → ${sub.end}`;
      $('modalText').textContent = sub.text;
      $('modalPrev').disabled = idx === 0;
      $('modalNext').disabled = idx === state.subtitles.length - 1;
      $('modalOverlay').classList.add('visible');
    }

    function closeModal() {
      $('modalOverlay').classList.remove('visible');
      state.modalIdx = -1;
    }

    function doSearch(query) {
      state.searchQuery = query;
      if (!query) {
        state.filteredIndices = null;
        $('searchCount').textContent = '';
      } else {
        const lower = query.toLowerCase();
        state.filteredIndices = [];
        state.subtitles.forEach((sub, i) => {
          if (sub.text.toLowerCase().includes(lower)) state.filteredIndices.push(i);
        });
      }
      render();
    }

    // ── File Loading ──

    function loadFile() { $('fileInput').click(); }

    $('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        pausePlayback();
        state.subtitles = parseSRT(ev.target.result);
        state.selected.clear();
        state.searchQuery = '';
        state.filteredIndices = null;
        state.currentTime = 0;
        state.activeSubIdx = -1;

        const last = state.subtitles[state.subtitles.length - 1];
        state.totalDuration = last ? last.endSec : 0;

        $('searchInput').value = '';
        $('appTitle').textContent = file.name.replace('.srt', '');
        $('scrubberTimeRight').textContent = secondsToTime(state.totalDuration);
        $('toolbarTimer').textContent = '00:00:00';
        $('scrubberTimeLeft').textContent = '00:00:00';
        $('scrubberFill').style.width = '0%';
        $('scrubberThumb').style.left = '0%';

        render();
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    $('btnLoad').addEventListener('click', loadFile);
    $('btnLoadEmpty').addEventListener('click', loadFile);

    // ── Playback Controls ──

    $('btnPlay').addEventListener('click', togglePlayback);
    $('btnSkipBack').addEventListener('click', () => seekTo(state.currentTime - 10));
    $('btnSkipFwd').addEventListener('click', () => seekTo(state.currentTime + 10));

    // ── Scrubber Drag ──

    const scrubberTrack = $('scrubberTrack');
    let isDragging = false;

    function scrubFromEvent(e) {
      const rect = scrubberTrack.getBoundingClientRect();
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      const pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
      seekTo(pct * state.totalDuration);
    }

    scrubberTrack.addEventListener('mousedown', e => {
      isDragging = true;
      scrubberTrack.classList.add('dragging');
      scrubFromEvent(e);
    });
    scrubberTrack.addEventListener('touchstart', e => {
      isDragging = true;
      scrubberTrack.classList.add('dragging');
      scrubFromEvent(e);
    }, { passive: true });

    document.addEventListener('mousemove', e => { if (isDragging) scrubFromEvent(e); });
    document.addEventListener('touchmove', e => { if (isDragging) scrubFromEvent(e); }, { passive: true });

    document.addEventListener('mouseup', () => {
      if (isDragging) { isDragging = false; scrubberTrack.classList.remove('dragging'); }
    });
    document.addEventListener('touchend', () => {
      if (isDragging) { isDragging = false; scrubberTrack.classList.remove('dragging'); }
    });

    // ── Tabs ──

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.currentTab = tab.dataset.tab;
        render();
      });
    });

    // ── Subtitle List Click ──

    $('subtitleList').addEventListener('click', e => {
      const chk = e.target.closest('[data-check]');
      if (chk) {
        const i = parseInt(chk.dataset.check);
        state.selected.has(i) ? state.selected.delete(i) : state.selected.add(i);
        render();
        return;
      }
      const seek = e.target.closest('[data-seek]');
      if (seek) {
        const sub = state.subtitles[parseInt(seek.dataset.seek)];
        if (sub) seekTo(sub.startSec);
        return;
      }
      const view = e.target.closest('[data-view]');
      if (view) {
        openModal(parseInt(view.dataset.view));
        return;
      }
    });

    // ── Reader Click → seek to subtitle time ──

    $('readerView').addEventListener('click', e => {
      const el = e.target.closest('[data-reader]');
      if (el) {
        const sub = state.subtitles[parseInt(el.dataset.reader)];
        if (sub) seekTo(sub.startSec);
      }
    });

    // ── Select All ──

    $('selectAll').addEventListener('change', e => {
      if (e.target.checked) {
        const indices = state.filteredIndices !== null
          ? state.filteredIndices
          : state.subtitles.map((_, i) => i);
        indices.forEach(i => state.selected.add(i));
      } else {
        state.selected.clear();
      }
      render();
    });

    // ── Search ──

    $('btnSearch').addEventListener('click', () => {
      const bar = $('searchBar');
      bar.classList.toggle('visible');
      if (bar.classList.contains('visible')) {
        $('searchInput').focus();
      } else {
        $('searchInput').value = '';
        doSearch('');
      }
    });

    $('searchClose').addEventListener('click', () => {
      $('searchBar').classList.remove('visible');
      $('searchInput').value = '';
      doSearch('');
    });

    $('searchInput').addEventListener('input', e => doSearch(e.target.value));

    // ── Jump ──

    $('btnJumpTop').addEventListener('click', () => {
      $('subtitleList').scrollTop = 0;
      $('readerView').scrollTop = 0;
    });

    $('btnJumpBottom').addEventListener('click', () => {
      $('subtitleList').scrollTop = $('subtitleList').scrollHeight;
      $('readerView').scrollTop = $('readerView').scrollHeight;
    });

    // ── Modal ──

    $('modalOverlay').addEventListener('click', e => {
      if (e.target === $('modalOverlay')) closeModal();
    });

    $('modalPrev').addEventListener('click', () => {
      if (state.modalIdx > 0) openModal(state.modalIdx - 1);
    });

    $('modalNext').addEventListener('click', () => {
      if (state.modalIdx < state.subtitles.length - 1) openModal(state.modalIdx + 1);
    });

    let touchStartX = 0;
    $('modal').addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    $('modal').addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 60) {
        if (diff > 0 && state.modalIdx > 0) openModal(state.modalIdx - 1);
        else if (diff < 0 && state.modalIdx < state.subtitles.length - 1) openModal(state.modalIdx + 1);
      }
    }, { passive: true });

    // ── Keyboard ──

    document.addEventListener('keydown', e => {
      if (e.key === ' ' && state.subtitles.length > 0 && state.modalIdx < 0) {
        e.preventDefault();
        togglePlayback();
        return;
      }
      if (state.modalIdx < 0) return;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (state.modalIdx > 0) openModal(state.modalIdx - 1);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        if (state.modalIdx < state.subtitles.length - 1) openModal(state.modalIdx + 1);
      } else if (e.key === 'Escape') {
        closeModal();
      }
    });

    // ── Init ──

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    render();
  </script>
</body>
</html>
